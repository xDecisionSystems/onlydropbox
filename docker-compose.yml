version: "3.8"

services:
  dropbox:
    image: adclab/codedrop:latest
    container_name: codedrop
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # Optional uid/gid mapping for mounted host paths.
      PUID: "${PUID:-1000}"
      PGID: "${PGID:-1000}"
      # Required account-style path components (LXC-style).
      ACCOUNT_ROOT: "${ACCOUNT_ROOT:-}"
      ACCOUNT_NAME: "${ACCOUNT_NAME:-}"
      # Comma-separated folder paths to sync within ACCOUNT_ROOT/ACCOUNT_NAME (nested paths supported).
      # Example: "Work,Photos,Apps/Overleaf"
      SYNC_FOLDERS: "${SYNC_FOLDERS:-}"
    volumes:
      - ./data/dropbox-config:/home/dropbox/.dropbox
      - ./data/dropbox-sync:/home/dropbox/Dropbox
      - ./data/codedrop-config:/home/dropbox/.config/codedrop
